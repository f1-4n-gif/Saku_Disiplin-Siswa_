<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saku Disiplin - SMPN 6 Manokwari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        
        /* Animasi Cepat */
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Optimasi Tampilan Cetak */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .print-only { display: block !important; }
            .container-print { width: 100% !important; margin: 0 !important; padding: 0 !important; }
            table { border-collapse: collapse !important; width: 100% !important; border: 1px solid #000 !important; }
            th, td { border: 1px solid #000 !important; padding: 8px !important; color: black !important; }
        }
        .print-only { display: none; }
        
        /* Smooth Scroll */
        html { scroll-behavior: smooth; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <div id="app">
        <!-- LAYAR LOGIN -->
        <div id="login-screen" class="min-h-screen bg-slate-100 flex items-center justify-center p-4 no-print">
            <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200 fade-in">
                <div class="h-56 bg-indigo-950 relative flex items-center justify-center overflow-hidden">
                    <div class="absolute inset-0 opacity-40 bg-cover bg-center" style="background-image: url('https://i.ibb.co.com/k6GFHZ0q/IMG-20240913-WA0003.jpg');"></div>
                    <div class="relative z-10 text-center text-white p-6">
                        <img src="https://i.ibb.co.com/JWy6dhzM/LOGO-SMP6-1-removebg-preview.png" class="h-20 mx-auto mb-3 drop-shadow-lg" alt="Logo SMP 6">
                        <h1 class="text-xl font-black uppercase italic tracking-tighter">Saku Disiplin Siswa</h1>
                        <p class="text-[9px] font-black uppercase tracking-[0.3em] opacity-80">SMP Negeri 6 Manokwari</p>
                    </div>
                </div>
                <div class="p-8 space-y-3">
                    <button onclick="handleLogin('Guru BK')" class="w-full group flex items-center gap-4 p-5 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-indigo-500 transition-all hover:bg-white active:scale-95 text-left">
                        <div class="p-3 bg-indigo-100 text-indigo-700 rounded-xl group-hover:bg-indigo-600 group-hover:text-white transition-colors"><i data-lucide="shield-check"></i></div>
                        <div>
                            <p class="font-black text-xs uppercase">GURU BK</p>
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">Akses Administrator</p>
                        </div>
                    </button>
                    <button onclick="handleLogin('Guru Piket')" class="w-full group flex items-center gap-4 p-5 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-orange-500 transition-all hover:bg-white active:scale-95 text-left">
                        <div class="p-3 bg-orange-100 text-orange-700 rounded-xl group-hover:bg-orange-600 group-hover:text-white transition-colors"><i data-lucide="edit-3"></i></div>
                        <div>
                            <p class="font-black text-xs uppercase">GURU PIKET</p>
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">Input Harian</p>
                        </div>
                    </button>
                </div>
                <div class="p-4 bg-slate-50 border-t border-slate-100 text-center">
                    <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Sistem Informasi Kedisiplinan</p>
                </div>
            </div>
        </div>

        <!-- DASHBOARD UTAMA -->
        <div id="dashboard" class="hidden min-h-screen fade-in">
            <header class="bg-indigo-950 text-white pb-32 pt-8 px-4 relative overflow-hidden">
                <div class="absolute inset-0 opacity-20 bg-cover bg-center pointer-events-none no-print" style="background-image: url('https://i.ibb.co.com/k6GFHZ0q/IMG-20240913-WA0003.jpg');"></div>
                <div class="max-w-6xl mx-auto relative z-10">
                    <div class="flex justify-between items-center mb-8 no-print">
                        <div class="flex items-center gap-3 bg-white/10 px-4 py-2 rounded-full border border-white/10 backdrop-blur-md">
                            <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
                            <span class="text-[9px] font-black uppercase tracking-widest" id="display-role">MEMUAT...</span>
                        </div>
                        <button onclick="handleLogout()" class="text-[9px] font-black uppercase tracking-widest opacity-60 hover:opacity-100 flex items-center gap-2 transition-opacity">KELUAR <i data-lucide="log-out" size="12"></i></button>
                    </div>
                    
                    <div class="flex flex-col items-center justify-center text-center">
                        <img src="https://i.ibb.co.com/JWy6dhzM/LOGO-SMP6-1-removebg-preview.png" class="h-16 md:h-20 drop-shadow-lg mb-4" alt="Logo SMP 6">
                        <h1 class="text-3xl md:text-5xl font-black italic tracking-tighter uppercase mb-1">SAKU DISIPLIN SISWA</h1>
                        <p class="text-indigo-200 text-[10px] font-black uppercase tracking-[0.5em]">SMP Negeri 6 Manokwari</p>
                    </div>
                </div>
            </header>

            <main class="max-w-6xl mx-auto px-4 -mt-16 pb-20 relative z-20 container-print">
                <!-- Statistik Ringkas -->
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6 no-print">
                    <div class="bg-white p-4 rounded-3xl shadow-lg border border-slate-200/50 flex items-center gap-3">
                        <div class="p-2 rounded-xl bg-indigo-50 text-indigo-600"><i data-lucide="database" size="18"></i></div>
                        <div><p class="text-slate-400 text-[7px] font-black uppercase tracking-widest">Total</p><div id="stat-total" class="text-lg font-black">0</div></div>
                    </div>
                    <div class="bg-white p-4 rounded-3xl shadow-lg border border-slate-200/50 flex items-center gap-3">
                        <div class="p-2 rounded-xl bg-orange-50 text-orange-600"><i data-lucide="calendar" size="18"></i></div>
                        <div><p class="text-slate-400 text-[7px] font-black uppercase tracking-widest">Minggu</p><div id="stat-week" class="text-lg font-black text-orange-600">0</div></div>
                    </div>
                    <div class="bg-white p-4 rounded-3xl shadow-lg border border-slate-200/50 flex items-center gap-3">
                        <div class="p-2 rounded-xl bg-rose-50 text-rose-600"><i data-lucide="bar-chart" size="18"></i></div>
                        <div><p class="text-slate-400 text-[7px] font-black uppercase tracking-widest">Bulan</p><div id="stat-month" class="text-lg font-black text-rose-600">0</div></div>
                    </div>
                    <button onclick="window.print()" class="bg-white p-4 rounded-3xl shadow-lg border border-slate-200/50 flex items-center justify-center gap-2 hover:bg-slate-50 transition-all active:scale-95">
                        <i data-lucide="printer" class="text-indigo-600" size="18"></i>
                        <span class="text-[8px] font-black uppercase tracking-widest text-slate-600">Cetak</span>
                    </button>
                </div>

                <!-- Kontrol Navigasi -->
                <div class="bg-white p-3 rounded-[2rem] shadow-xl border border-slate-200/50 flex flex-col md:flex-row gap-3 mb-6 no-print">
                    <div class="flex-1 relative">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" size="16"></i>
                        <input id="search-input" oninput="renderRecords()" placeholder="Cari nama atau kelas..." class="w-full pl-10 pr-4 py-3 bg-slate-50 rounded-2xl text-sm font-bold outline-none border border-transparent focus:border-indigo-100 transition-all">
                    </div>
                    <div class="flex gap-2">
                        <select id="filter-period" onchange="renderRecords()" class="bg-slate-50 px-4 py-3 rounded-2xl text-[9px] font-black uppercase outline-none border border-slate-100 cursor-pointer">
                            <option value="all">SEMUA WAKTU</option>
                            <option value="week">MINGGU INI</option>
                            <option value="month">BULAN INI</option>
                        </select>
                        <button onclick="toggleModal(true)" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-black text-[9px] uppercase tracking-widest shadow-lg hover:bg-indigo-700 transition-all flex items-center gap-2 active:scale-95">
                            <i data-lucide="plus" size="14"></i> TAMBAH
                        </button>
                    </div>
                </div>

                <!-- Kontainer Tabel -->
                <div class="bg-white rounded-[2rem] shadow-xl border border-slate-200/50 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[8px] font-black uppercase tracking-widest text-slate-400 border-b border-slate-100">
                                <tr>
                                    <th class="px-6 py-4">Waktu</th>
                                    <th class="px-6 py-4">Siswa</th>
                                    <th class="px-6 py-4">Pelanggaran</th>
                                    <th class="px-6 py-4 text-center">Status</th>
                                    <th class="px-6 py-4 text-right no-print">Opsi</th>
                                </tr>
                            </thead>
                            <tbody id="records-body" class="divide-y divide-slate-50 text-sm italic">
                                <!-- Data Dimuat di Sini -->
                            </tbody>
                        </table>
                    </div>
                    <div id="empty-state" class="hidden p-16 text-center flex flex-col items-center">
                        <div class="p-4 bg-slate-50 rounded-full text-slate-200 mb-3"><i data-lucide="file-x" size="32"></i></div>
                        <p class="text-[9px] font-black uppercase text-slate-400 tracking-widest">Belum ada data</p>
                    </div>
                </div>
            </main>
        </div>

        <!-- MODAL INPUT CEPAT -->
        <div id="modal-form" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm no-print">
            <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden fade-in max-h-[90vh] overflow-y-auto">
                <div class="p-6 bg-indigo-900 text-white flex justify-between items-center">
                    <h2 class="font-black uppercase italic tracking-tighter">Input Pelanggaran</h2>
                    <button onclick="toggleModal(false)" class="p-1 hover:bg-white/10 rounded-full transition-colors"><i data-lucide="x" size="20"></i></button>
                </div>
                <form id="record-form" class="p-6 space-y-4 text-left">
                    <div class="space-y-1">
                        <label class="text-[8px] font-black uppercase text-slate-400 ml-2">Nama Siswa</label>
                        <input type="text" id="input-nama" required class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 font-bold uppercase text-xs outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[8px] font-black uppercase text-slate-400 ml-2">Kelas</label>
                            <select id="input-kelas" required class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 font-bold text-xs outline-none focus:ring-2 focus:ring-indigo-500 uppercase">
                                <option value="">Pilih</option>
                                <optgroup label="VII">
                                    <script>for(let i=65; i<=73; i++) document.write(`<option value="VII ${String.fromCharCode(i)}">VII ${String.fromCharCode(i)}</option>`);</script>
                                </optgroup>
                                <optgroup label="VIII">
                                    <script>for(let i=65; i<=73; i++) document.write(`<option value="VIII ${String.fromCharCode(i)}">VIII ${String.fromCharCode(i)}</option>`);</script>
                                </optgroup>
                                <optgroup label="IX">
                                    <script>for(let i=65; i<=73; i++) document.write(`<option value="IX ${String.fromCharCode(i)}">IX ${String.fromCharCode(i)}</option>`);</script>
                                </optgroup>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[8px] font-black uppercase text-slate-400 ml-2">Tingkat</label>
                            <select id="input-tingkat" onchange="updateGuide(this.value)" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 font-bold text-xs outline-none focus:ring-2 focus:ring-indigo-500">
                                <option value="Ringan">Ringan</option>
                                <option value="Sedang">Sedang</option>
                                <option value="Berat">Berat</option>
                            </select>
                        </div>
                    </div>
                    <div id="guide-box" class="p-3 bg-emerald-50 rounded-xl border border-emerald-100 text-[9px] text-emerald-700 italic font-medium">
                        Contoh: Terlambat, atribut tidak lengkap.
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] font-black uppercase text-slate-400 ml-2">Detail Kejadian</label>
                        <textarea id="input-jenis" rows="2" required class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 font-bold text-xs outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                    </div>
                    <button type="submit" id="btn-submit" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">SIMPAN DATA</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'saku_disiplin_offline_v1';
        let activeUserRole = null;
        let records = [];

        // Fungsi Load Data (Cepat)
        const initData = () => {
            const data = localStorage.getItem(STORAGE_KEY);
            records = data ? JSON.parse(data) : [];
            records.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            renderRecords();
        };

        // Fungsi Simpan
        const saveData = () => {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            renderRecords();
        };

        // Login Handler
        window.handleLogin = (role) => {
            activeUserRole = role;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('display-role').innerText = role;
            initData();
            lucide.createIcons();
        };

        window.handleLogout = () => {
            if (confirm('Keluar aplikasi?')) location.reload();
        };

        window.toggleModal = (show) => {
            const modal = document.getElementById('modal-form');
            if (show) {
                modal.classList.remove('hidden');
                setTimeout(() => document.getElementById('input-nama').focus(), 100);
            } else {
                modal.classList.add('hidden');
                document.getElementById('record-form').reset();
            }
        };

        window.updateGuide = (val) => {
            const box = document.getElementById('guide-box');
            if (val === 'Ringan') {
                box.className = "p-3 bg-emerald-50 rounded-xl border border-emerald-100 text-[9px] text-emerald-700 italic font-medium";
                box.innerText = "Contoh: Terlambat, atribut tidak lengkap, baju keluar.";
            } else if (val === 'Sedang') {
                box.className = "p-3 bg-orange-50 rounded-xl border border-orange-100 text-[9px] text-orange-700 italic font-medium";
                box.innerText = "Contoh: Bolos, membawa HP, merusak fasilitas.";
            } else {
                box.className = "p-3 bg-rose-50 rounded-xl border border-rose-100 text-[9px] text-rose-700 italic font-medium";
                box.innerText = "Contoh: Merokok, mencuri, berkelahi, asusila.";
            }
        };

        document.getElementById('record-form').onsubmit = (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.innerText = "MENYIMPAN...";
            btn.disabled = true;

            const now = new Date();
            const newRecord = {
                id: 'REC-' + Date.now(),
                nama: document.getElementById('input-nama').value.trim(),
                kelas: document.getElementById('input-kelas').value,
                tingkat: document.getElementById('input-tingkat').value,
                jenis: document.getElementById('input-jenis').value.trim(),
                tanggalStr: now.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }),
                timestamp: now.toISOString(),
                petugas: activeUserRole
            };

            setTimeout(() => {
                records.unshift(newRecord);
                saveData();
                toggleModal(false);
                btn.innerText = "SIMPAN DATA";
                btn.disabled = false;
            }, 300); // Simulasi proses cepat
        };

        window.deleteRecord = (id) => {
            if (confirm('Hapus data ini?')) {
                records = records.filter(r => r.id !== id);
                saveData();
            }
        };

        // Render Data (Optimasi DOM)
        window.renderRecords = () => {
            const query = (document.getElementById('search-input').value || "").toLowerCase();
            const period = document.getElementById('filter-period').value;
            const body = document.getElementById('records-body');
            const empty = document.getElementById('empty-state');
            
            const now = new Date();
            const startOfWeek = new Date(now.setDate(now.getDate() - now.getDay() + 1)).setHours(0,0,0,0);
            const thisMonth = new Date().getMonth();

            let filtered = records.filter(r => 
                (r.nama.toLowerCase().includes(query) || r.kelas.toLowerCase().includes(query))
            );

            if (period === 'week') filtered = filtered.filter(r => new Date(r.timestamp) >= startOfWeek);
            if (period === 'month') filtered = filtered.filter(r => new Date(r.timestamp).getMonth() === thisMonth);

            // Statistik
            document.getElementById('stat-total').innerText = records.length;
            document.getElementById('stat-week').innerText = records.filter(r => new Date(r.timestamp) >= startOfWeek).length;
            document.getElementById('stat-month').innerText = records.filter(r => new Date(r.timestamp).getMonth() === thisMonth).length;

            if (filtered.length === 0) {
                body.innerHTML = '';
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                body.innerHTML = filtered.map(r => `
                    <tr class="hover:bg-slate-50 transition-colors group">
                        <td class="px-6 py-4 text-[9px] font-bold text-slate-400 italic">${r.tanggalStr}</td>
                        <td class="px-6 py-4">
                            <p class="font-black text-xs uppercase text-slate-800">${r.nama}</p>
                            <span class="text-[7px] font-black text-indigo-500 uppercase px-1.5 py-0.5 bg-indigo-50 rounded border border-indigo-100">${r.kelas}</span>
                        </td>
                        <td class="px-6 py-4 text-xs font-semibold text-slate-600 leading-relaxed">${r.jenis}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="text-[7px] font-black px-3 py-1 rounded-full border ${
                                r.tingkat === 'Berat' ? 'bg-rose-50 text-rose-600 border-rose-100' : 
                                r.tingkat === 'Sedang' ? 'bg-orange-50 text-orange-600 border-orange-100' : 
                                'bg-emerald-50 text-emerald-600 border-emerald-100'
                            }">${r.tingkat}</span>
                        </td>
                        <td class="px-6 py-4 text-right no-print">
                            <button onclick="deleteRecord('${r.id}')" class="p-2 text-slate-200 hover:text-rose-500 transition-all">
                                <i data-lucide="trash-2" size="14"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            }
            lucide.createIcons();
        };

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
